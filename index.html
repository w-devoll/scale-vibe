<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>My Weight Tracker</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --primary: #007AFF; --bg: #F2F2F7; --card: #FFFFFF; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background: var(--bg); margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .container { width: 100%; max-width: 400px; }
        .card { background: var(--card); padding: 24px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); margin-bottom: 20px; }
        h1 { font-size: 24px; font-weight: 700; margin-bottom: 20px; color: #1c1c1e; }
        input { width: 100%; padding: 15px; border: 2px solid #efeff4; border-radius: 12px; font-size: 18px; margin-bottom: 15px; box-sizing: border-box; outline: none; transition: border 0.2s; }
        input:focus { border-color: var(--primary); }
        button { width: 100%; padding: 16px; background: var(--primary); color: white; border: none; border-radius: 12px; font-size: 18px; font-weight: 600; cursor: pointer; transition: transform 0.1s; }
        button:active { transform: scale(0.98); opacity: 0.9; }
        #status { font-size: 12px; color: #8e8e93; text-align: center; margin-top: 10px; height: 15px; }
    </style>
</head>
<body>

<div class="container">
    <h1>Scale Vibe</h1>
    <div class="card">
        <input type="number" id="weightInput" step="0.1" pattern="\d*" placeholder="00.0" inputmode="decimal">
        <button onclick="addEntry()">Log Weight</button>
        <div id="status"></div>
    </div>

    <div class="card">
        <canvas id="weightChart"></canvas>
    </div>
</div>

<script>
    const SHEETS_URL = 'YOUR_GOOGLE_APPS_SCRIPT_URL_HERE';
    let weightData = JSON.parse(localStorage.getItem('vibe_weights')) || [];

    async function addEntry() {
        const input = document.getElementById('weightInput');
        const status = document.getElementById('status');
        const val = input.value;
        if (!val) return;

        status.innerText = "Saving...";
        
        const newEntry = { date: new Date().toLocaleDateString('en-US', {month:'short', day:'numeric'}), weight: parseFloat(val) };
        weightData.push(newEntry);
        localStorage.setItem('vibe_weights', JSON.stringify(weightData));
        
        renderChart();
        input.value = '';

        try {
            await fetch(SHEETS_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({weight: val}) });
            status.innerText = "Synced to Cloud ✓";
            setTimeout(() => status.innerText = "", 3000);
        } catch (e) {
            status.innerText = "Saved locally (Offline)";
        }
    }

    function renderChart() {
        const ctx = document.getElementById('weightChart').getContext('2d');
        if (window.myChart) window.myChart.destroy();
        window.myChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: weightData.slice(-7).map(d => d.date),
                datasets: [{
                    label: 'Weight',
                    data: weightData.slice(-7).map(d => d.weight),
                    borderColor: '#007AFF',
                    backgroundColor: 'rgba(0, 122, 255, 0.1)',
                    fill: true,
                    tension: 0.4,
                    borderWidth: 3,
                    pointRadius: 5
                }]
            },
            options: { plugins: { legend: { display: false } }, scales: { y: { beginAtZero: false } } }
        });
    }
    renderChart();
</script>

</body>
</html>
